<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Статистика — Русский для Даши</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<div class="stats-header">
  <a href="/">← Игра</a>
  <h1>Статистика для родителей</h1>
</div>

<div id="load-error" class="error-banner" style="display:none">
  Не удалось загрузить данные. Проверьте подключение.
</div>

<!-- Summary row -->
<div class="summary-row">
  <div class="stat-card">
    <span class="stat-value" id="total-sessions">—</span>
    <span class="stat-label">сессий</span>
  </div>
  <div class="stat-card">
    <span class="stat-value" id="total-attempts">—</span>
    <span class="stat-label">заданий</span>
  </div>
  <div class="stat-card">
    <span class="stat-value" id="overall-accuracy">—</span>
    <span class="stat-label">точность</span>
  </div>
</div>

<!-- Last 7 days -->
<div class="week-section">
  <h2>Последние 7 дней</h2>
  <div class="week-grid" id="week-grid"></div>
</div>

<!-- Weak spots -->
<div class="weak-spots-section">
  <h2>Слабые места</h2>
  <div id="weak-spots-container">
    <p class="no-data">Загрузка...</p>
  </div>
</div>

<script>
const LEVEL_NAMES = ['Буквы', 'Слоги', 'Слова', 'Предложения'];

async function loadStats() {
  try {
    const [summary, weakSpots] = await Promise.all([
      fetch('/api/stats/summary').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
      fetch('/api/stats/weak-spots').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
    ]);

    // Summary
    document.getElementById('total-sessions').textContent = summary.total_sessions;
    document.getElementById('total-attempts').textContent = summary.total_attempts;
    document.getElementById('overall-accuracy').textContent =
      summary.overall_accuracy > 0 ? summary.overall_accuracy.toFixed(1) + '%' : '—';

    // 7-day grid
    const weekGrid = document.getElementById('week-grid');
    weekGrid.innerHTML = '';
    const today = new Date();
    for (let i = 6; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(today.getDate() - i);
      const iso = d.toISOString().slice(0, 10);
      const sq = document.createElement('div');
      sq.className = 'day-square';
      sq.title = iso;
      if (summary.sessions_last_7_days.includes(iso)) {
        sq.classList.add('active');
      }
      weekGrid.appendChild(sq);
    }

    // Weak spots
    const container = document.getElementById('weak-spots-container');
    container.innerHTML = '';

    if (!weakSpots.length) {
      container.innerHTML = '<p class="no-data">Пока нет слабых мест — так держать! 🎉</p>';
      return;
    }

    for (let level = 0; level <= 3; level++) {
      const items = weakSpots.filter(item => item.level === level);
      if (!items.length) continue;

      const group = document.createElement('div');
      group.className = 'level-group';
      group.innerHTML = `<h3>${LEVEL_NAMES[level]}</h3>`;

      items.forEach(item => {
        const errorPct = Math.round(item.error_rate * 100);
        const colorClass = item.error_rate > 0.7 ? 'error-high' : 'error-medium';

        const qd = item.question_data;
        const display = qd.display || qd.syllable ||
          (qd.sentence ? qd.sentence.slice(0, 28) + (qd.sentence.length > 28 ? '…' : '') : item.correct_answer);

        const row = document.createElement('div');
        row.className = `weak-item ${colorClass}`;
        row.innerHTML = `
          <span class="weak-target">${display}</span>
          <span class="weak-error">${errorPct}% ошибок</span>
          <span class="weak-count">${item.attempt_count} попыток</span>
        `;
        group.appendChild(row);
      });

      container.appendChild(group);
    }
  } catch (e) {
    document.getElementById('load-error').style.display = 'block';
    document.getElementById('weak-spots-container').innerHTML =
      '<p class="no-data">Ошибка загрузки.</p>';
  }
}

loadStats();
</script>
</body>
</html>
